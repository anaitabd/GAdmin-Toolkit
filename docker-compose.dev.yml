version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: gadmin-toolkit-postgres
    environment:
      POSTGRES_DB: gadmin_toolkit
      POSTGRES_USER: gadmin_user
      POSTGRES_PASSWORD: changeme_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gadmin_user -d gadmin_toolkit']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache & queue
  redis:
    image: redis:7-alpine
    container_name: gadmin-toolkit-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gadmin-toolkit-backend
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      PORT: 3001
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gadmin_toolkit
      DB_USER: gadmin_user
      DB_PASSWORD: changeme_dev_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      API_TOKENS: user-token-12345678-1234-1234-1234-123456789012
      ADMIN_TOKENS: admin-token-87654321-4321-4321-4321-210987654321
      JWT_SECRET: dev-secret-change-in-production
      MAX_CONCURRENT_JOBS: 10
      JOB_TIMEOUT_MS: 300000
      TEMP_DIR_BASE: /tmp/gadmin-toolkit-jobs
      SCRIPTS_CONFIG_PATH: ../config/scripts.yml
      CORS_ORIGIN: 'http://localhost:3000'
    ports:
      - '3001:3001'
      - '9090:9090'
    volumes:
      - ./backend/src:/app/src
      - ./backend/dist:/app/dist
      - /tmp/gadmin-toolkit-jobs:/tmp/gadmin-toolkit-jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gadmin-toolkit-frontend
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: 'http://localhost:3001/api'
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: gadmin-toolkit-network

